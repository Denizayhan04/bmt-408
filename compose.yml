services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: projedb
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  api:
    build: ./app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/projedb
    depends_on:
      - db
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: always

volumes:
  pgdata:
